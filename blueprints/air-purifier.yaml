# -------------------------------------------------------------------
# Blueprint Metadata
# Version:       2.2.0
# Last Updated:  2026-07-18
# Author:        Michael Dorchain & Assistant
# Source:        https://github.com/mdorchain/home-assistant-blueprints/
#
# Changelog:
#   1.12.0 (2026-07-17) - Fixed syntax errors on entity variables and restored dynamic fallback logic
#   1.13.0 (2026-07-17) - Fixed manual override loop by checking trigger source before returning to Auto
#   1.14.0 (2026-07-17) - Added a configurable minimum duration (default 30 min) for Manual mode
#   1.15.0 (2026-07-17) - Converted input_manual_min_duration to a clean duration selector
#   1.16.0 (2026-07-18) - Fixed fan staying off while stuck in Manual mode by adding fan.turn_on
#                          to the Manual default branch
#   2.1.0  (2026-07-18) - Removed the 'for' clause on the PM2.5 trigger (was blocking the
#                          automation from ever firing on a live, fluctuating sensor).
#                          input_auto_min_duration now correctly means "minimum time the fan
#                          must stay ON before it's allowed to auto-turn-off" (tracked via the
#                          fan's on/off last_changed timestamp), instead of a trigger stability
#                          window. Auto ON reacts immediately; only Auto OFF is duration-gated.
#   2.2.0  (2026-07-18) - Replaced the last_changed/last_updated Jinja duration math with
#                          native HA `condition: state ... for:` checks (on preset_mode for
#                          Manual, on the main state for Auto). No helper entity needed; the
#                          'for' timer is tracked by HA's own state engine and only resets
#                          when the specific state/attribute being watched actually changes -
#                          fully immune to unrelated attribute noise.
# -------------------------------------------------------------------

blueprint:
  name: 🌫️ Xiaomi Air Purifier Control
  description: >
    Controls a Xiaomi fan based on PM2.5 levels. 
    In "Auto" mode, it uses the Auto PM2.5 thresholds to turn the fan ON/OFF.
    In "Manual" mode, it always sets the favorite speed to your target (e.g., 14).
    When PM2.5 goes BELOW the manual threshold, it automatically returns the purifier to "Auto" preset mode (only if triggered by the sensor and minimum manual time has elapsed).
  domain: automation
  source_url: https://github.com/mdorchain/home-assistant-blueprints/blob/main/blueprints/air-purifier.yaml

  input:  
    input_air_purifier:
      name: Air Purifier Fan
      selector:
        entity:
          domain: fan

    input_speed_level_entity:
      name: Fan Speed Level Entity
      description: The number entity matching your model speed level (e.g., number.zhimi_rmb1_6bce_favorite_level)
      selector:
        entity:
          domain: number

    input_pm25_sensor:
      name: PM2.5 Sensor
      selector:
        entity:
          domain: sensor

    input_auto_threshold_on:
      name: Automatic Mode - PM2.5 ON Threshold
      description: Value above which the fan turns ON
      default: 25
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: µg/m³
          mode: slider

    input_auto_threshold_off:
      name: Automatic Mode - PM2.5 OFF Threshold
      description: Value below which the fan turns OFF
      default: 15
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: µg/m³
          mode: slider
          
    input_auto_min_duration:
      name: Automatic Mode - Minimum ON Duration
      description: The minimum time the fan must stay ON before it's allowed to automatically turn OFF.
      default: "00:05:00"
      selector:
        duration:

    input_manual_threshold:
      name: Manual Mode - PM2.5 Fallback Threshold
      description: Value below which the fan returns to Auto mode.
      default: 50
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: µg/m³
          mode: slider

    input_manual_speed:
      name: Manual Mode - Speed Value
      description: Target value for the favorite level number entity when preset is "Manual"
      default: 14
      selector:
        number:
          min: 0
          max: 14
          mode: slider

    input_manual_min_duration:
      name: Manual Mode - Minimum Duration
      description: The minimum time the fan must remain in Manual mode before being allowed to roll back to Auto.
      default: "00:30:00"
      selector:
        duration:

variables:
  auto_threshold_on: !input input_auto_threshold_on
  auto_threshold_off: !input input_auto_threshold_off
  manual_threshold: !input input_manual_threshold
  air_purifier_entity: !input input_air_purifier
  pm25_sensor: !input input_pm25_sensor
  manual_speed: !input input_manual_speed
  speed_level_entity: !input input_speed_level_entity

trigger:
  # Trigger 1: PM2.5 sensor reports a new value
  - platform: state
    entity_id: !input input_pm25_sensor
    id: pm25_changed

  # Trigger 2: Fan preset changes to Auto or Manual
  - platform: state
    entity_id: !input input_air_purifier
    attribute: preset_mode
    id: preset_changed

action:
  - choose:
      # 1) PM2.5 at/above the manual threshold and we're not already in Manual
      #    -> turn on, switch to Manual, set the target speed
      - conditions:
          - condition: template
            value_template: >
              {{ states(pm25_sensor) | is_number and
                 states(pm25_sensor) | float >= manual_threshold | float and
                 state_attr(air_purifier_entity, 'preset_mode') != 'Manual' }}
        sequence:
          - service: fan.turn_on
            target:
              entity_id: "{{ air_purifier_entity }}"
          - service: fan.set_preset_mode
            target:
              entity_id: "{{ air_purifier_entity }}"
            data:
              preset_mode: Manual
          - service: number.set_value
            target:
              entity_id: "{{ speed_level_entity }}"
            data:
              value: "{{ manual_speed }}"

      # 2) Preset was just switched to Manual by you (via app/device), not by this automation
      #    -> make sure the fan is actually on and running at the target speed
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'preset_changed' and
                 state_attr(air_purifier_entity, 'preset_mode') == 'Manual' }}
        sequence:
          - service: fan.turn_on
            target:
              entity_id: "{{ air_purifier_entity }}"
          - service: number.set_value
            target:
              entity_id: "{{ speed_level_entity }}"
            data:
              value: "{{ manual_speed }}"

      # 3) In Manual, PM2.5 has dropped back below the manual threshold, and preset_mode has
      #    held at Manual continuously for at least manual_min_duration -> fall back to Auto.
      #    (Gated on trigger.id == 'pm25_changed' so this doesn't fire off of our own
      #    fan.set_preset_mode / number.set_value calls above. The 'for' condition on the
      #    preset_mode attribute is tracked natively by HA's state engine - it only resets
      #    when preset_mode itself changes, so it's immune to unrelated attribute noise.)
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'pm25_changed' and
                 states(pm25_sensor) | is_number and
                 states(pm25_sensor) | float < manual_threshold | float }}
          - condition: state
            entity_id: !input input_air_purifier
            attribute: preset_mode
            state: "Manual"
            for: !input input_manual_min_duration
        sequence:
          - service: fan.set_preset_mode
            target:
              entity_id: "{{ air_purifier_entity }}"
            data:
              preset_mode: Auto

      # 4) In Auto, PM2.5 at/above the ON threshold -> turn on immediately
      - conditions:
          - condition: template
            value_template: >
              {{ state_attr(air_purifier_entity, 'preset_mode') == 'Auto' and
                 states(pm25_sensor) | is_number and
                 states(pm25_sensor) | float >= auto_threshold_on | float }}
        sequence:
          - service: fan.turn_on
            target:
              entity_id: "{{ air_purifier_entity }}"

      # 5) In Auto, PM2.5 below the OFF threshold, and the fan has held state 'on'
      #    continuously for at least auto_min_duration -> turn off.
      - conditions:
          - condition: template
            value_template: >
              {{ state_attr(air_purifier_entity, 'preset_mode') == 'Auto' and
                 states(pm25_sensor) | is_number and
                 states(pm25_sensor) | float < auto_threshold_off | float }}
          - condition: state
            entity_id: !input input_air_purifier
            state: "on"
            for: !input input_auto_min_duration
        sequence:
          - service: fan.turn_off
            target:
              entity_id: "{{ air_purifier_entity }}"

mode: single