blueprint:
  name: 🌫️ Air Purifier Control (1.2.0)
  description: >
    Turns a fan on or off based on PM2.5 levels from a sensor.
    Only triggers if the air purifier is currently set to the "Auto" preset.
  domain: automation
  source_url: https://github.com/mdorchain/home-assistant-blueprints/blob/main/blueprints/air-purifier.yaml

  input:  
    input_air_purifier:
      name: Air Purifier Fan
      selector:
        entity:
          domain: fan

    input_pm25_sensor:
      name: PM2.5 Sensor
      selector:
        entity:
          domain: sensor

    input_threshold_on:
      name: PM2.5 ON Threshold
      description: Value above which the fan turns ON
      default: 25
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider

    input_threshold_off:
      name: PM2.5 OFF Threshold
      description: Value below which the fan turns OFF
      default: 15
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider
          
    time_period:
      name: Trigger Duration
      description: How long the PM2.5 value must remain stable before triggering
      default: "00:05:00"
      selector:
        duration:

variables:
  threshold_on: !input input_threshold_on
  threshold_off: !input input_threshold_off
  air_purifier: !input input_air_purifier

trigger:
  - platform: state
    entity_id: !input input_pm25_sensor
    for: !input time_period

action:
  # Only proceed if the fan is currently in "Auto" mode
  - condition: template
    value_template: "{{ state_attr(air_purifier, 'preset_mode') == 'Auto' }}"
    
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.to_state.state | is_number and trigger.to_state.state | float > threshold_on }}
        sequence:
          - service: fan.turn_on
            target:
              entity_id: !input input_air_purifier
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.to_state.state | is_number and trigger.to_state.state | float < threshold_off }}
        sequence:
          - service: fan.turn_off
            target:
              entity_id: !input input_air_purifier

mode: single