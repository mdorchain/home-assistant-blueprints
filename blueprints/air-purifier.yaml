# Last Updated: 2026-06-23
# Author:        Michael Dorchain
# Source:        https://github.com/mdorchain/home-assistant-blueprints/
#
# Changelog:
#   1.6.0 (2026-06-23) - Adjusted target preset back to "Manual" for Xiaomi number control
#   1.5.0 (2026-06-23) - Tailored for Xiaomi Favorite Level entities (0-14 scale)
#   1.4.0 (2026-06-23) - Added fallback action to lock speed to 14% if in Manual preset
# -------------------------------------------------------------------

blueprint:
  name: 🌫️ Xiaomi Air Purifier Control (1.6.0)
  description: >
    Controls a Xiaomi fan based on PM2.5 levels when set to "Auto". 
    If the preset is set to "Manual", it forces your Xiaomi favorite level number entity to 14.
  domain: automation
  source_url: https://github.com/mdorchain/home-assistant-blueprints/blob/main/blueprints/air-purifier.yaml

  input:  
    input_air_purifier:
      name: Air Purifier Fan
      selector:
        entity:
          domain: fan

    input_favorite_level_number:
      name: Xiaomi Favorite Level Number Entity
      description: The number entity matching your model (e.g., number.zhimi_rmb1_6bce_favorite_level)
      selector:
        entity:
          domain: number

    input_pm25_sensor:
      name: PM2.5 Sensor
      selector:
        entity:
          domain: sensor

    input_threshold_on:
      name: PM2.5 ON Threshold
      description: Value above which the fan turns ON
      default: 25
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider

    input_threshold_off:
      name: PM2.5 OFF Threshold
      description: Value below which the fan turns OFF
      default: 15
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider
          
    time_period:
      name: Trigger Duration
      description: How long the PM2.5 value must remain stable before triggering
      default: "00:05:00"
      selector:
        duration:

    input_manual_speed:
      name: Xiaomi Favorite Level Value
      description: Target value for the favorite level number entity when preset is "Manual"
      default: 14
      selector:
        number:
          min: 0
          max: 14
          mode: box

variables:
  threshold_on: !input input_threshold_on
  threshold_off: !input input_threshold_off
  air_purifier: !input input_air_purifier
  favorite_level_entity: !input input_favorite_level_number
  pm25_sensor: !input input_pm25_sensor
  manual_speed: !input input_manual_speed

trigger:
  # Trigger 1: PM2.5 level changes and stays stable
  - platform: state
    entity_id: !input input_pm25_sensor
    for: !input time_period
    id: pm25_changed

  # Trigger 2: Fan preset changes to Auto or Manual
  - platform: state
    entity_id: !input input_air_purifier
    attribute: preset_mode
    id: preset_changed

action:
  - choose:
      # OPTION 1: Fan is in "Auto" mode -> Run normal PM2.5 automated automation
      - conditions:
          - condition: template
            value_template: "{{ state_attr(air_purifier, 'preset_mode') == 'Auto' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states(pm25_sensor) | is_number and states(pm25_sensor) | float > threshold_on }}
                sequence:
                  - service: fan.turn_on
                    target:
                      entity_id: !input input_air_purifier
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states(pm25_sensor) | is_number and states(pm25_sensor) | float < threshold_off }}
                sequence:
                  - service: fan.turn_off
                    target:
                      entity_id: !input input_air_purifier

      # OPTION 2: Fan is in "Manual" mode -> Set the number entity to 14
      - conditions:
          - condition: template
            value_template: "{{ state_attr(air_purifier, 'preset_mode') == 'Manual' }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: !input input_favorite_level_number
            data:
              value: "{{ manual_speed }}"

mode: single