blueprint:
  name: 🌫️ Xiaomi Air Purifier Control
  description: >
    Controls a Xiaomi fan based on PM2.5 levels. 
    In "Auto" mode, it uses the Auto PM2.5 thresholds to turn the fan ON/OFF.
    In "Manual" mode, it always sets the favorite speed to your target (e.g., 14).
    When PM2.5 goes BELOW the manual threshold, it automatically returns the purifier to "Auto" preset mode (only if triggered by the sensor and minimum manual time has elapsed).
  domain: automation
  source_url: https://github.com/mdorchain/home-assistant-blueprints/blob/main/blueprints/air-purifier.yaml

  input:  
    input_air_purifier:
      name: Air Purifier Fan
      selector:
        entity:
          domain: fan

    input_speed_level_entity:
      name: Speed Level Entity
      description: The number entity matching your model speed level (e.g., number.zhimi_rmb1_6bce_favorite_level)
      selector:
        entity:
          domain: number

    input_pm25_sensor:
      name: PM2.5 Sensor
      selector:
        entity:
          domain: sensor

    input_threshold_on:
      name: PM2.5 ON Threshold
      description: Value above which the fan turns ON
      default: 25
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider

    input_threshold_off:
      name: PM2.5 OFF Threshold
      description: Value below which the fan turns OFF
      default: 15
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider

    input_manual_threshold:
      name: Manual Mode - PM2.5 Fallback Threshold
      description: Value below which the fan returns to Auto mode.
      default: 50
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: µg/m³
          mode: slider
          
    time_period:
      name: Trigger Duration
      description: How long the PM2.5 value must remain stable before triggering
      default: "00:05:00"
      selector:
        duration:

    input_manual_speed:
      name: Manual Mode Speed Value
      description: Target value for the favorite level number entity when preset is "Manual"
      default: 14
      selector:
        number:
          min: 0
          max: 14
          mode: slider

    input_manual_min_duration:
      name: Manual Mode - Minimum Duration
      description: The minimum time (in minutes) the fan must remain in Manual mode before being allowed to roll back to Auto.
      default: 30
      selector:
        number:
          min: 0
          max: 1440
          unit_of_measurement: min
          mode: slider

variables:
  threshold_on: !input input_threshold_on
  threshold_off: !input input_threshold_off
  manual_threshold: !input input_manual_threshold
  air_purifier_entity: !input input_air_purifier
  pm25_sensor: !input input_pm25_sensor
  manual_speed: !input input_manual_speed
  speed_level_entity: !input input_speed_level_entity
  manual_min_duration: !input input_manual_min_duration

trigger:
  # Trigger 1: PM2.5 level changes and stays stable
  - platform: state
    entity_id: !input input_pm25_sensor
    for: !input time_period
    id: pm25_changed

  # Trigger 2: Fan preset changes to Auto or Manual
  - platform: state
    entity_id: !input input_air_purifier
    attribute: preset_mode
    id: preset_changed

action:
  - choose:
      # OPTION 1: Fan is in "Auto" mode
      - conditions:
          - condition: template
            value_template: "{{ state_attr(air_purifier_entity, 'preset_mode') == 'Auto' }}"
        sequence:
          - choose:
              # PM2.5 spikes past manual threshold (e.g. 50) -> Drop out of Auto instantly
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states(pm25_sensor) | is_number and states(pm25_sensor) | float > manual_threshold }}
                sequence:
                  - service: fan.turn_on
                    target:
                      entity_id: "{{ air_purifier_entity }}"
                  - service: fan.set_preset_mode
                    target:
                      entity_id: "{{ air_purifier_entity }}"
                    data:
                      preset_mode: Manual
                  - service: number.set_value
                    target:
                      entity_id: "{{ speed_level_entity }}"
                    data:
                      value: "{{ manual_speed }}"
              # PM2.5 crosses normal Auto ON threshold -> Turn ON
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states(pm25_sensor) | is_number and states(pm25_sensor) | float > threshold_on }}
                sequence:
                  - service: fan.turn_on
                    target:
                      entity_id: "{{ air_purifier_entity }}"
              # PM2.5 crosses normal Auto OFF threshold -> Turn OFF
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states(pm25_sensor) | is_number and states(pm25_sensor) | float < threshold_off }}
                sequence:
                  - service: fan.turn_off
                    target:
                      entity_id: "{{ air_purifier_entity }}"

      # OPTION 2: Fan is in "Manual" mode
      - conditions:
          - condition: template
            value_template: "{{ state_attr(air_purifier_entity, 'preset_mode') == 'Manual' }}"
        sequence:
          - choose:
              # ONLY drop back to Auto if:
              # 1. The PM2.5 sensor triggered it
              # 2. The air is clean (below manual_threshold)
              # 3. The minimum manual duration has elapsed since the fan's state/attributes were last updated
              - conditions:
                  - condition: template
                    value_template: >
                      {{ trigger.id == 'pm25_changed' and states(pm25_sensor) | is_number and states(pm25_sensor) | float < manual_threshold and (now() - states[air_purifier_entity].last_updated).total_seconds() >= (manual_min_duration | float * 60) }}
                sequence:
                  - service: fan.set_preset_mode
                    target:
                      entity_id: "{{ air_purifier_entity }}"
                    data:
                      preset_mode: Auto
            
            # DEFAULT: If you selected Manual yourself (preset_changed), just force the target speed
            default:
              - service: number.set_value
                target:
                  entity_id: "{{ speed_level_entity }}"
                data:
                  value: "{{ manual_speed }}"

mode: single