# Changelog:
#   1.0.0 (2026-07-12) - Initial release
#   1.0.1 (2026-07-13) - Reolink app URI updated to match the latest version of the Reolink app.
#   1.0.2 (2026-07-14) - Improved fallback logic for camera snapshot retrieval.
#   1.0.3 (2026-07-15) - Added support for multiple person sensors and improved notification formatting.
#   1.0.4 (2026-07-16) - Added cooldown time for notifications to prevent spamming.
#   1.0.5 (2026-07-17) - Updated blueprint to use a more efficient template for checking last triggered time. Single camera per automation instance is now enforced.
#   1.0.6 (2026-07-18) - Added support for multiple notification targets and improved error handling for missing camera snapshots.
#   1.0.7 (2026-07-19) - Added support for multiple rich notification targets and improved error handling for missing camera snapshots.
# -------------------------------------------------------------------

blueprint:
  name: Reolink Camera Person Notification (Modern Notify Engine)
  description: Fires instantly and terminates. Natively maps the target engine selector to clean notification execution paths.
  domain: automation
  input:
    person_sensor:
      name: Person Detection Binary Sensor
      description: The Reolink binary sensor for this specific camera (e.g., binary_sensor.front_door_person).
      selector:
        entity:
          domain: binary_sensor
          device_class: 
            - occupancy
            - motion
    notification_targets:
      name: Notification Targets
      description: Select the notify entities/devices that should receive this message (e.g., notify.mobile_app_your_phone).
      selector:
        target:
          entity:
            domain: notify
    cooldown_time:
      name: Notification Cooldown (Seconds)
      description: The number of seconds to lock out this specific camera from spamming your phone after a trigger.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
          mode: slider

mode: single

variables:
  cooldown: !input cooldown_time

trigger:
  - platform: state
    entity_id: !input person_sensor
    to: "on"

condition:
  - condition: template
    value_template: >-
      {{ this.attributes.last_triggered is none or 
         (now() - this.attributes.last_triggered).total_seconds() > (cooldown | float) }}

action:
  - variables:
      sensor_entity: !input person_sensor

  # Clean fix: Natively maps the target config object directly without risky string manipulation
  - action: notify.send_message
    target: !input notification_targets
    data:
      title: "Person Detected"
      message: "Person spotted at {{ states[sensor_entity].name | replace(' Person', '') | replace(' person', '') | replace(' Motion', '') | replace(' motion', '') }}."
      data:
        image: >-
          {% set base = sensor_entity | replace('binary_sensor.', 'camera.') | replace('_person', '') | replace('_motion', '') %}
          {% if states(base ~ '_snapshots_clear') != 'unknown' %}
            /api/camera_proxy/{{ base }}_snapshots_clear
          {% else %}
            /api/camera_proxy/{{ base }}_snapshots_fluent
          {% endif %}
        attachment:
          url: >-
            {% set base = sensor_entity | replace('binary_sensor.', 'camera.') | replace('_person', '') | replace('_motion', '') %}
            {% if states(base ~ '_snapshots_clear') != 'unknown' %}
              /api/camera_proxy/{{ base }}_snapshots_clear
            {% else %}
              /api/camera_proxy/{{ base }}_snapshots_fluent
            {% endif %}
          content-type: jpeg
        clickAction: /lovelace
        actions:
          - action: "URI"
            title: "Open Reolink App"
            uri: "app://com.mcu.reolink"