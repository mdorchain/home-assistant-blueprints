blueprint:
  name: Reolink Multi-Camera Person Notification
  description: Automatically uses snapshots_clear if available, otherwise safely falls back to snapshots_fluent.
  domain: automationinput:
    person_sensors:
      name: Person Detection Binary Sensors
      description: Select all the Reolink person binary sensors you want to monitor.
      selector:
        entity:
          domain: binary_sensor
          device_class: occupancy
          multiple: true
    notify_service:
      name: Notification Service String
      description: Type your exact mobile notification service name here (e.g., notify.mobile_app_your_phone).
      selector:
        text: {}
    cooldown_time:
      name: Notification Cooldown (Seconds)
      description: The number of seconds to wait before letting the SAME camera trigger another notification. Other cameras will remain unaffected.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
          mode: slider

mode: parallel
max: 10

trigger:
  - platform: state
    entity_id: !input person_sensors
    to: "on"

condition: []

action:
  # FIX: We map the input to a local variable block so the automation can use it dynamically
  - variables:
      cooldown: !input cooldown_time
      target_service: !input notify_service

  # FIX FOR FLICKERING: We use a template condition that evaluates how long the sensor has been continuously active overall,
  # or we pass a brief delay block to throttle executions per-entity.
  - condition: template
    value_template: >-
      {{ trigger.from_state is none or (now() - trigger.from_state.last_reported).total_seconds() > (cooldown | float) }}

  - action: "{{ target_service }}"
    data:
      title: "Person Detected"
      message: "Person spotted at {{ trigger.to_state.name | replace(' Person', '') | replace(' person', '') }}."
      data:
        image: >-
          {% set base = trigger.entity_id | replace('binary_sensor.', 'camera.') | replace('_person', '') %}
          {% if states(base ~ '_snapshots_clear') != 'unknown' %}
            /api/camera_proxy/{{ base }}_snapshots_clear
          {% else %}
            /api/camera_proxy/{{ base }}_snapshots_fluent
          {% endif %}
        attachment:
          url: >-
            {% set base = trigger.entity_id | replace('binary_sensor.', 'camera.') | replace('_person', '') %}
            {% if states(base ~ '_snapshots_clear') != 'unknown' %}
              /api/camera_proxy/{{ base }}_snapshots_clear
            {% else %}
              /api/camera_proxy/{{ base }}_snapshots_fluent
            {% endif %}
          content-type: jpeg
        clickAction: /lovelace/
        actions:
          - action: "URI"
            title: "Open Reolink App"
            uri: "app://com.mcu.reolink"