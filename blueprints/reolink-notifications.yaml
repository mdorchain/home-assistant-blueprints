blueprint:
  name: Reolink Camera Person Notification
  description: Fires instantly and terminates. Loops through multiple chosen target mobile notification apps to send snapshots, clickable actions, and app redirects.
  domain: automation
  input:
    person_sensor:
      name: Person Detection Binary Sensor
      description: The Reolink binary sensor for this specific camera (e.g., binary_sensor.front_door_person).
      selector:
        entity:
          domain: binary_sensor
          device_class: 
            - occupancy
            - motion
    notification_targets:
      name: Mobile App Notification Targets
      description: Choose all the target mobile devices/notify entities you want to alert simultaneously.
      selector:
        target:
          entity:
            domain: notify
    cooldown_time:
      name: Notification Cooldown (Seconds)
      description: The number of seconds to lock out this specific camera from spamming your phones after a trigger.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
          mode: slider

mode: single

variables:
  cooldown: !input cooldown_time
  # Capture the target inputs at the root level to parse their entity IDs safely
  raw_targets: !input notification_targets

trigger:
  - platform: state
    entity_id: !input person_sensor
    to: "on"

condition:
  - condition: template
    value_template: >-
      {{ this.attributes.last_triggered is none or 
         (now() - this.attributes.last_triggered).total_seconds() > (cooldown | float) }}

action:
  # Loop cleanly over every item selected in your UI target picker box
  - repeat:
      for_each: >-
        {% if raw_targets.entity_id is string %}
          {{ [raw_targets.entity_id] }}
        {% else %}
          {{ raw_targets.entity_id }}
        {% endif %}
      sequence:
        - variables:
            sensor_entity: !input person_sensor
            # Extract the specific phone notification string for this loop iteration
            current_target: "{{ repeat.item }}"

        - action: "{{ current_target }}"
          data:
            title: "Person Detected"
            message: "Person spotted at {{ states[sensor_entity].name | replace(' Person', '') | replace(' person', '') | replace(' Motion', '') | replace(' motion', '') }}."
            data:
              image: >-
                {% set base = sensor_entity | replace('binary_sensor.', 'camera.') | replace('_person', '') | replace('_motion', '') %}
                {% if states(base ~ '_snapshots_clear') != 'unknown' %}
                  /api/camera_proxy/{{ base }}_snapshots_clear
                {% else %}
                  /api/camera_proxy/{{ base }}_snapshots_fluent
                {% endif %}
              attachment:
                url: >-
                  {% set base = sensor_entity | replace('binary_sensor.', 'camera.') | replace('_person', '') | replace('_motion', '') %}
                  {% if states(base ~ '_snapshots_clear') != 'unknown' %}
                    /api/camera_proxy/{{ base }}_snapshots_clear
                  {% else %}
                    /api/camera_proxy/{{ base }}_snapshots_fluent
                  {% endif %}
                content-type: jpeg
              clickAction: /lovelace
              actions:
                - action: "URI"
                  title: "Open Reolink App"
                  uri: "app://com.mcu.reolink"