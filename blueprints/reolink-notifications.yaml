# Changelog:
#   1.0.0 (2026-07-12) - Initial release
#   1.0.1 (2026-07-13) - Reolink app URI updated to match the latest version of the Reolink app.
#   1.0.2 (2026-07-14) - Improved fallback logic for camera snapshot retrieval.
#   1.0.3 (2026-07-15) - Added support for multiple person sensors and improved notification formatting.
#   1.0.4 (2026-07-16) - Added cooldown time for notifications to prevent spamming.
#   1.0.5 (2026-07-17) - Updated blueprint to use a more efficient template for checking last triggered time. Single camera per automation instance is now enforced.
#   1.0.6 (2026-07-18) - Added support for multiple notification targets and improved error handling for missing camera snapshots.
