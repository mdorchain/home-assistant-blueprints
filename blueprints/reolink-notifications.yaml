# Source:        https://github.com/mdorchain/home-assistant-blueprints/
#
# Changelog:
#   1.0.0 (2026-07-12) - Initial release
#   1.0.1 (2026-07-13) - Reolink app URI updated to match the latest version of the Reolink app.
#   1.0.2 (2026-07-14) - Improved fallback logic for camera snapshot retrieval.
#   1.0.3 (2026-07-15) - Added support for multiple person sensors and improved notification formatting.
#   1.0.4 (2026-07-16) - Added cooldown time for notifications to prevent spamming.
#   1.0.5 (2026-07-17) - Updated blueprint to use a more efficient template for checking last triggered time. Single camera per automation instance is now enforced.
# -------------------------------------------------------------------

blueprint:
  name: Reolink Camera Person Notification
  description: Fires instantly and terminates. Uses a clean mathematical lookback condition to prevent flicker spam without leaving active delays hanging.
  domain: automation
  input:
    person_sensor:
      name: Person/Motion Detection Binary Sensor
      description: The Reolink binary sensor for this specific camera (e.g., binary_sensor.front_door_person or binary_sensor.front_door_motion).
      selector:
        entity:
          domain: binary_sensor
          device_class: occupancy
    notify_service:
      name: Notification Service String
      description: Type your exact mobile notification service name here (e.g., notify.mobile_app_your_phone).
      selector:
        text: {}
    cooldown_time:
      name: Notification Cooldown (Seconds)
      description: The number of seconds to lock out this specific camera from spamming your phone after a trigger.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
          mode: slider

# Using 'single' combined with a condition allows the script to stop immediately if it fails the time check
mode: single

trigger:
  - platform: state
    entity_id: !input person_sensor
    to: "on"

condition:
  # If it has never run, or if the time since it last ran is greater than the cooldown, it passes.
  - condition: template
    value_template: >-
      {{ this.attributes.last_triggered is none or 
         (now() - this.attributes.last_triggered).total_seconds() > (cooldown_time | float) }}

action:
  - variables:
      target_service: !input notify_service
      sensor_entity: !input person_sensor

  # Send the push notification instantly
  - action: "{{ target_service }}"
    data:
      title: "Person Detected"
      message: "Person spotted at {{ states[sensor_entity].name | replace(' Person', '') | replace(' person', '') }}."
      data:
        image: >-
          {% set base = sensor_entity | replace('binary_sensor.', 'camera.') | replace('_person', '') %}
          {% if states(base ~ '_snapshots_clear') != 'unknown' %}
            /api/camera_proxy/{{ base }}_snapshots_clear
          {% else %}
            /api/camera_proxy/{{ base }}_snapshots_fluent
          {% endif %}
        attachment:
          url: >-
            {% set base = sensor_entity | replace('binary_sensor.', 'camera.') | replace('_person', '') %}
            {% if states(base ~ '_snapshots_clear') != 'unknown' %}
              /api/camera_proxy/{{ base }}_snapshots_clear
            {% else %}
              /api/camera_proxy/{{ base }}_snapshots_fluent
            {% endif %}
          content-type: jpeg
        clickAction: /lovelace/cameras
        actions:
          - action: "URI"
            title: "Open Reolink App"
            uri: "app://com.mcu.reolink"